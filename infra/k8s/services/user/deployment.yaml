apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: shopflow-production
  labels:
    app: user-service
    tier: application
    version: latest
spec:
  replicas: 2                    # 2 replicas for HA — if one pod dies, the other serves traffic
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0          # never have 0 pods running during deploy
      maxSurge: 1                # spin up 1 new pod before killing old one
  template:
    metadata:
      labels:
        app: user-service
        tier: application
    spec:
      containers:
        - name: user-service
          image: ghcr.io/raviteja2206/shopflow-user:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: shopflow-config
            - secretRef:
                name: shopflow-secrets
          env:
            - name: PORT
              value: "8001"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
              echo "postgres is ready"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "waiting for redis..."
                sleep 2
              done
              echo "redis is ready"
