# WARNING: This file is a TEMPLATE only.
# Real secrets are injected via AWS Secrets Manager + External Secrets Operator.
# Never commit real secret values to git.
apiVersion: v1
kind: Secret
metadata:
  name: shopflow-secrets
  namespace: shopflow-production
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_WITH_AWS_SECRET"
  SECRET_KEY: "REPLACE_WITH_AWS_SECRET"
  REDIS_URL: "redis://redis-service:6379/0"
  DATABASE_URL: "postgresql+asyncpg://shopflow:REPLACE_WITH_AWS_SECRET@postgres-service:5432/shopflow"
