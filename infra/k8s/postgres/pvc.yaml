apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: shopflow-production
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard    # minikube storage class (gp2 is AWS EBS)
  resources:
    requests:
      storage: 5Gi              # reduced from 20Gi — plenty for local dev
