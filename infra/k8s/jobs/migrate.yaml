# Migration Job — runs alembic upgrade head for all three services
# Run this before deploying application services:
#   kubectl apply -f infra/k8s/jobs/migrate.yaml
#   kubectl wait --for=condition=complete job/migrate-schemas -n shopflow-production --timeout=120s
#   kubectl wait --for=condition=complete job/migrate-user -n shopflow-production --timeout=120s
#   kubectl wait --for=condition=complete job/migrate-product -n shopflow-production --timeout=120s
#   kubectl wait --for=condition=complete job/migrate-order -n shopflow-production --timeout=120s
---
# Step 1 — create schemas (idempotent)
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-schemas
  namespace: shopflow-production
  labels:
    app: migration
    component: schema-setup
spec:
  ttlSecondsAfterFinished: 300      # auto-delete after 5 mins
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: schema-setup
          image: python:3.11-alpine
          command:
            - sh
            - -c
            - |
              pip install asyncpg --quiet
              python - << 'PYEOF'
              import asyncio, asyncpg, os

              async def setup():
                  url = os.environ["DATABASE_URL"].replace(
                      "postgresql+asyncpg://", "postgresql://"
                  )
                  conn = await asyncpg.connect(url)
                  for schema in ["users", "products", "orders"]:
                      await conn.execute(f"CREATE SCHEMA IF NOT EXISTS {schema}")
                      await conn.execute(f"GRANT ALL ON SCHEMA {schema} TO shopflow")
                      print(f"Schema '{schema}' ready")
                  await conn.close()

              asyncio.run(setup())
              PYEOF
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: DATABASE_URL
---
# Step 2 — user service migrations
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-user
  namespace: shopflow-production
  labels:
    app: migration
    component: user
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres-service 5432; do echo 'waiting...'; sleep 2; done"
      containers:
        - name: migrate
          image: ghcr.io/raviteja2206/shopflow-user:latest
          imagePullPolicy: IfNotPresent
          command: [alembic, upgrade, head]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shopflow-secrets
                  key: DATABASE_URL
