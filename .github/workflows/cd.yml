name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  # ── Deploy to staging ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging   # GitHub environment with protection rules

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name shopflow-cluster \
            --region ap-south-1

      - name: Deploy to staging
        run: |
          # Extract image SHA from CI run
          SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)

          # Update each service with new image
          for svc in user product order notification; do
            kubectl set image deployment/$svc-service \
              $svc-service=ghcr.io/${{ github.repository_owner }}/shopflow-$svc:$SHA \
              --namespace=staging
          done

          # Wait for rollout
          for svc in user product order notification; do
            kubectl rollout status deployment/$svc-service \
              --namespace=staging \
              --timeout=5m
          done

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get ingress shopflow-ingress \
            --namespace=staging \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Health check all services
          for port in 8001 8002 8003 8004; do
            curl -f http://$STAGING_URL/health || exit 1
          done

  # ── Deploy to production ──────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # requires manual approval in GitHub UI

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to production (blue/green)
        run: |
          SHA=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)

          for svc in user product order notification; do
            kubectl set image deployment/$svc-service \
              $svc-service=ghcr.io/${{ github.repository_owner }}/shopflow-$svc:$SHA \
              --namespace=production
          done

          for svc in user product order notification; do
            kubectl rollout status deployment/$svc-service \
              --namespace=production \
              --timeout=10m
          done

      - name: Verify production
        run: |
          echo "Production deployment complete"
          kubectl get pods --namespace=production
