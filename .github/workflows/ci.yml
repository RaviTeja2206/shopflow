name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shopflow

jobs:
  # ── Test ──────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user, product, order]
      fail-fast: false  # run all services even if one fails

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shopflow
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: shopflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create database schemas
        run: |
          PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql \
            -h localhost -U shopflow -d shopflow \
            -c "CREATE SCHEMA IF NOT EXISTS users;
                CREATE SCHEMA IF NOT EXISTS products;
                CREATE SCHEMA IF NOT EXISTS orders;
                GRANT ALL ON SCHEMA users TO shopflow;
                GRANT ALL ON SCHEMA products TO shopflow;
                GRANT ALL ON SCHEMA orders TO shopflow;"

      - name: Run migrations
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://shopflow:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shopflow
        run: alembic upgrade head

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://shopflow:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shopflow
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint all services
        run: |
          for svc in user product order notification; do
            echo "=== Linting $svc ==="
            ruff check services/$svc/app/
          done

  # ── Build ─────────────────────────────────────────────────────
  build:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test, lint]           # only build if tests and lint pass
    if: github.ref == 'refs/heads/main'   # only on main branch

    strategy:
      matrix:
        service: [user, product, order, notification]

    permissions:
      contents: read
      packages: write             # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided, no setup needed

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha         # use GitHub Actions cache
          cache-to: type=gha,mode=max  # cache layers between runs
