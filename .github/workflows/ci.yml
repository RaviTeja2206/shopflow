name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/shopflow

# Grant GITHUB_TOKEN the permissions required to make a Pages deployment
permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [user, product, order]
      fail-fast: false

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shopflow
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: shopflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create database schemas
        run: |
          python - << 'PYEOF'
          import asyncio
          import asyncpg

          async def create_schemas():
              conn = await asyncpg.connect(
                  "postgresql://shopflow:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shopflow"
              )
              for schema in ["users", "products", "orders"]:
                  await conn.execute(f"CREATE SCHEMA IF NOT EXISTS {schema}")
                  await conn.execute(f"GRANT ALL ON SCHEMA {schema} TO shopflow")
              await conn.close()
              print("Schemas created")

          asyncio.run(create_schemas())
          PYEOF

      - name: Run migrations
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://shopflow:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shopflow
        run: alembic upgrade head
        continue-on-error: true

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://shopflow:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/shopflow
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ENVIRONMENT: test
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint all services
        run: |
          for svc in user product order notification; do
            echo "=== Linting $svc ==="
            ruff check services/$svc/app/ || exit 1
          done

  build:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [user, product, order, notification]
      fail-fast: false   # don't cancel other builds if one fails

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
