networks:
  shopflow:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

services:

  # ─── Infrastructure ───────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: shopflow-postgres
    environment:
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow_secret
      POSTGRES_DB: shopflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - shopflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shopflow-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - shopflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - shopflow

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopflow-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    networks:
      - shopflow
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── FastAPI Services ─────────────────────────────────────────

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: shopflow-user
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:shopflow_secret@postgres:5432/shopflow
      SERVICE_NAME: user-service
    volumes:
      - ./services/user:/app
    ports:
      - "8001:8000"
    networks:
      - shopflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build:
      context: ./services/product
      dockerfile: Dockerfile
    container_name: shopflow-product
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:shopflow_secret@postgres:5432/shopflow
      SERVICE_NAME: product-service
    volumes:
      - ./services/product:/app
    ports:
      - "8002:8000"
    networks:
      - shopflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: ./services/order
      dockerfile: Dockerfile
    container_name: shopflow-order
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://shopflow:shopflow_secret@postgres:5432/shopflow
      SERVICE_NAME: order-service
    volumes:
      - ./services/order:/app
    ports:
      - "8003:8000"
    networks:
      - shopflow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: shopflow-notification
    env_file: .env
    environment:
      SERVICE_NAME: notification-service
    volumes:
      - ./services/notification:/app
    ports:
      - "8004:8000"
    networks:
      - shopflow
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ─── Observability ────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: shopflow-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - shopflow
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: shopflow-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - shopflow
    depends_on:
      - prometheus